<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" aria-label="Vila encantada ao entardecer">
  <defs>
    <linearGradient id="gSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c0320"/>
      <stop offset="48%"  stop-color="#3a0d5e"/>
      <stop offset="80%"  stop-color="#8b3210"/>
      <stop offset="100%" stop-color="#c96e14"/>
    </linearGradient>
    <linearGradient id="gHillBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#253d1c"/>
      <stop offset="100%" stop-color="#152510"/>
    </linearGradient>
    <linearGradient id="gHillFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3012"/>
      <stop offset="100%" stop-color="#0d1a09"/>
    </linearGradient>
    <radialGradient id="gMoonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff8d0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff8d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gWinGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffcc44" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffcc44" stop-opacity="0"/>
    </radialGradient>
    <filter id="fBlur2"><feGaussianBlur stdDeviation="2.5"/></filter>
    <filter id="fBlur1"><feGaussianBlur stdDeviation="1.2"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="480" height="300" fill="url(#gSky)"/>

  <!-- Stars -->
  <g fill="#fffde0">
    <circle cx="22"  cy="16"  r="1.2" opacity="0.9"/>
    <circle cx="66"  cy="9"   r="0.8" opacity="0.8"/>
    <circle cx="118" cy="22"  r="1.1" opacity="0.9"/>
    <circle cx="178" cy="7"   r="1.3" opacity="0.9"/>
    <circle cx="250" cy="20"  r="0.8" opacity="0.7"/>
    <circle cx="44"  cy="46"  r="0.9" opacity="0.8"/>
    <circle cx="98"  cy="36"  r="0.7" opacity="0.75"/>
    <circle cx="148" cy="42"  r="1.0" opacity="0.85"/>
    <circle cx="208" cy="36"  r="0.7" opacity="0.7"/>
    <circle cx="80"  cy="60"  r="0.7" opacity="0.7"/>
    <circle cx="162" cy="62"  r="0.6" opacity="0.65"/>
    <circle cx="298" cy="38"  r="0.8" opacity="0.75"/>
  </g>

  <!-- Moon halo -->
  <circle cx="398" cy="54" r="50" fill="url(#gMoonGlow)" filter="url(#fBlur2)"/>
  <!-- Moon -->
  <circle cx="398" cy="54" r="28" fill="#fefae0"/>
  <circle cx="386" cy="46" r="5"  fill="#f0e880" opacity="0.3"/>
  <circle cx="408" cy="62" r="4"  fill="#f0e880" opacity="0.22"/>
  <circle cx="396" cy="63" r="3"  fill="#f0e880" opacity="0.18"/>

  <!-- Back hill -->
  <ellipse cx="240" cy="295" rx="320" ry="118" fill="url(#gHillBack)"/>

  <!-- ══ House 1 (left, small) ══ -->
  <rect x="88" y="150" width="8" height="23"  fill="#4a2a0e"/>
  <rect x="64" y="170" width="48" height="42" fill="#3d2810" rx="2"/>
  <polygon points="57,172 88,148 121,172"      fill="#6b2208"/>
  <!-- windows -->
  <rect x="70" y="179" width="13" height="14" fill="#ffcc44" rx="1"/>
  <rect x="90" y="179" width="13" height="14" fill="#ffcc44" rx="1"/>
  <!-- door -->
  <rect x="80" y="194" width="12" height="18" fill="#1e0e04" rx="1"/>
  <!-- smoke -->
  <path d="M92,148 C90,139 94,130 91,120 C88,110 92,100 89,91"
        stroke="#aaa" stroke-width="2.5" fill="none" opacity="0.38" stroke-linecap="round"/>

  <!-- ══ Tree (center-left) ══ -->
  <rect x="168" y="158" width="16" height="54" fill="#3d2010" rx="4"/>
  <path d="M168,208 Q156,213 150,218" stroke="#3d2010" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M184,208 Q196,213 202,218" stroke="#3d2010" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="176" cy="150" r="34" fill="#183814"/>
  <circle cx="156" cy="142" r="26" fill="#1c4016"/>
  <circle cx="196" cy="144" r="28" fill="#183814"/>
  <circle cx="176" cy="126" r="24" fill="#1f4818"/>
  <circle cx="160" cy="158" r="20" fill="#142e10"/>
  <circle cx="192" cy="156" r="19" fill="#142e10"/>

  <!-- ══ House 2 (main, center) ══ -->
  <rect x="250" y="128" width="10" height="32" fill="#5a2010"/>
  <rect x="210" y="158" width="72" height="54" fill="#4a3018" rx="2"/>
  <polygon points="202,160 246,130 290,160"    fill="#7a2810"/>
  <!-- windows -->
  <rect x="218" y="168" width="17" height="19" fill="#ffcc44" rx="1"/>
  <rect x="251" y="168" width="17" height="19" fill="#ffcc44" rx="1"/>
  <!-- door -->
  <rect x="231" y="186" width="18" height="26" fill="#1e0e04" rx="2"/>
  <circle cx="246" cy="200" r="2.5" fill="#c9922e"/>
  <!-- flower box -->
  <rect x="216" y="186" width="21" height="5" fill="#6b3810" rx="1"/>
  <circle cx="220" cy="185" r="3" fill="#cc4444"/>
  <circle cx="227" cy="184" r="3" fill="#dd6622"/>
  <circle cx="233" cy="185" r="3" fill="#cc4444"/>
  <!-- smoke -->
  <path d="M255,126 C253,116 257,106 254,96 C251,86 255,76 252,66"
        stroke="#aaa" stroke-width="3" fill="none" opacity="0.38" stroke-linecap="round"/>

  <!-- ══ House 3 (right, small) ══ -->
  <rect x="336" y="153" width="8" height="22" fill="#4a2a0e"/>
  <rect x="306" y="172" width="50" height="40" fill="#3d2810" rx="2"/>
  <polygon points="299,174 331,151 363,174"    fill="#6b2208"/>
  <!-- windows -->
  <rect x="313" y="181" width="13" height="13" fill="#ffcc44" rx="1"/>
  <rect x="333" y="181" width="13" height="13" fill="#ffcc44" rx="1"/>
  <!-- door -->
  <rect x="319" y="193" width="14" height="19" fill="#1e0e04" rx="1"/>
  <!-- smoke -->
  <path d="M340,151 C338,142 342,133 339,124"
        stroke="#bbb" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Window glow halos (blurred) -->
  <g filter="url(#fBlur1)" opacity="0.28">
    <rect x="68"  y="177" width="37" height="18" rx="9"  fill="#ffcc44"/>
    <rect x="216" y="165" width="54" height="25" rx="12" fill="#ffcc44"/>
    <rect x="311" y="179" width="37" height="16" rx="8"  fill="#ffcc44"/>
  </g>

  <!-- Foreground hill -->
  <path d="M0,222 Q80,208 160,222 Q240,236 320,218 Q400,202 480,222 L480,300 L0,300 Z"
        fill="url(#gHillFront)"/>

  <!-- Path / road -->
  <path d="M212,300 Q232,258 252,272 Q268,282 284,300"
        stroke="#5a3a18" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M212,300 Q232,258 252,272 Q268,282 284,300"
        stroke="#7a5028" stroke-width="7"  fill="none" stroke-linecap="round" opacity="0.45"/>

  <!-- Fireflies -->
  <g fill="#ffee66">
    <circle cx="148" cy="230" r="2.5" opacity="0.9"/>
    <circle cx="158" cy="220" r="1.5" opacity="0.7"/>
    <circle cx="140" cy="240" r="2.0" opacity="0.8"/>
    <circle cx="357" cy="224" r="2.5" opacity="0.9"/>
    <circle cx="368" cy="236" r="1.5" opacity="0.7"/>
    <circle cx="346" cy="232" r="2.0" opacity="0.8"/>
    <circle cx="242" cy="248" r="1.5" opacity="0.6"/>
  </g>
  <g stroke="#ffee66" stroke-width="1" opacity="0.7" stroke-linecap="round">
    <line x1="148" y1="227" x2="148" y2="233"/>
    <line x1="145" y1="230" x2="151" y2="230"/>
    <line x1="357" y1="221" x2="357" y2="227"/>
    <line x1="354" y1="224" x2="360" y2="224"/>
  </g>
</svg>
